name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Activate pnpm via Corepack
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  migrate:
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.PRODUCTION_BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: https://api.datadrop-app.com
      CORS_ORIGIN: https://datadrop-app.com
      COOKIE_DOMAIN: datadrop-app.com
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Activate pnpm via Corepack
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

  deploy_api:
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    defaults:
      run:
        working-directory: apps/server
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Link API project metadata
        run: |
          mkdir -p .vercel
          cat <<EOF > .vercel/project.json
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          EOF

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build API deployment
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy API
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy_web:
    runs-on: ubuntu-latest
    needs: deploy_api
    environment: production
    defaults:
      run:
        working-directory: apps/client
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Link web project metadata
        run: |
          mkdir -p .vercel
          cat <<EOF > .vercel/project.json
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          EOF

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build web deployment
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy web
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
