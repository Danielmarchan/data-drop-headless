services:
  - type: web
    name: data-drop-headless-api
    runtime: docker
    branch: main
    plan: starter
    region: virginia
    dockerfilePath: ./Dockerfile.server
    dockerContext: .
    healthCheckPath: /health
    preDeployCommand: pnpm --filter server db:migrate
    autoDeployTrigger: off
    envVars:
      - key: PORT
        value: "8080"
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
    buildFilter:
      paths:
        - apps/server/**
        - packages/api-schema/**
        - packages/shared/**
        - Dockerfile.server
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - turbo.json

  - type: web
    name: data-drop-headless-web
    runtime: static
    branch: main
    buildCommand: corepack enable && corepack prepare pnpm@10.0.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @data-drop/api-schema build && pnpm --filter @data-drop/shared build && pnpm --filter client build
    staticPublishPath: ./apps/client/dist
    autoDeployTrigger: off
    envVars:
      - key: API_URL
        sync: false
    buildFilter:
      paths:
        - apps/client/**
        - packages/api-schema/**
        - packages/shared/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - turbo.json
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
