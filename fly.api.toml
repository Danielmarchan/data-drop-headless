app = "data-drop-headless-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.server"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  BETTER_AUTH_URL = "https://api.datadrop-app.com"
  CORS_ORIGIN = "https://www.datadrop-app.com"
  COOKIE_DOMAIN = "datadrop-app.com"

[deploy]
  release_command = "pnpm --filter server db:migrate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
